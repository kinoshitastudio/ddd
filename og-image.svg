<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" shape-rendering="crispEdges">
  <title>DDD — Density · Daily · Design</title>

  <!-- ground -->
  <rect width="1200" height="630" fill="#0B111F"/>

  <!-- faint scanline texture -->
  <g opacity="0.06">
    <pattern id="scan" x="0" y="0" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="1" fill="#ffffff"/>
    </pattern>
    <rect width="1200" height="630" fill="url(#scan)"/>
  </g>

  <!-- subtle density dot field (bottom-left) -->
  <g fill="#2D3748">
    <g transform="translate(72,420)">
      <g id="row"><rect x="0"  y="0" width="6" height="6"/><rect x="14" y="0" width="6" height="6"/><rect x="28" y="0" width="6" height="6"/><rect x="42" y="0" width="6" height="6"/><rect x="56" y="0" width="6" height="6"/><rect x="70" y="0" width="6" height="6"/><rect x="84" y="0" width="6" height="6"/><rect x="98" y="0" width="6" height="6"/><rect x="112" y="0" width="6" height="6"/><rect x="126" y="0" width="6" height="6"/><rect x="140" y="0" width="6" height="6"/><rect x="154" y="0" width="6" height="6"/><rect x="168" y="0" width="6" height="6"/><rect x="182" y="0" width="6" height="6"/><rect x="196" y="0" width="6" height="6"/><rect x="210" y="0" width="6" height="6"/></g>
      <use href="#row" y="14"/>
      <use href="#row" y="28"/>
      <use href="#row" y="42"/>
      <use href="#row" y="56"/>
      <use href="#row" y="70"/>
      <use href="#row" y="84"/>
    </g>
  </g>

  <!-- 8×8 pixel "D" on the right, scaled up (cell = 44px) -->
  <svg x="644" y="139" width="352" height="352" viewBox="0 0 8 8" shape-rendering="crispEdges">
    <rect x="0" y="0" width="6" height="1" fill="#FFFFFF"/>
    <rect x="0" y="1" width="1" height="1" fill="#FFFFFF"/>
    <rect x="6" y="1" width="1" height="1" fill="#FFFFFF"/>
    <rect x="0" y="2" width="1" height="4" fill="#FFFFFF"/>
    <rect x="7" y="2" width="1" height="4" fill="#FFFFFF"/>
    <rect x="0" y="6" width="1" height="1" fill="#FFFFFF"/>
    <rect x="6" y="6" width="1" height="1" fill="#FFFFFF"/>
    <rect x="0" y="7" width="6" height="1" fill="#FFFFFF"/>
  </svg>

  <!-- title lockup (left block) -->
  <g font-family="'Space Mono','Courier New',monospace" fill="#FFFFFF">
    <text x="96" y="210" font-size="96" font-weight="700" letter-spacing="-2">DDD</text>
    <text x="96" y="258" font-size="18" fill="#6B7A90" letter-spacing="6">DENSITY  ·  DAILY  ·  DESIGN</text>
    <text x="96" y="320" font-size="20" fill="#AAB4C4">Five tasks. Sequential. Pixel density log.</text>
    <text x="96" y="346" font-size="20" fill="#AAB4C4">No account. No cloud. One HTML file.</text>
  </g>

  <!-- bottom signature strip -->
  <g font-family="'Space Mono','Courier New',monospace" fill="#6B7A90" font-size="14" letter-spacing="6">
    <text x="96" y="570">,ai  /  2026</text>
    <text x="1104" y="570" text-anchor="end">v1  ·  local-first</text>
  </g>

  <!-- red accent dot (favicon echo) -->
  <rect x="96" y="108" width="10" height="10" fill="#E13437"/>
</svg>
